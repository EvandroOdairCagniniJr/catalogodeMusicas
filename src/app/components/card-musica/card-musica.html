<div class="card">

  <img
    [src]="musica.imagem"
    alt="Capa da música"
    class="imagem-musica"
  />

  <h2>{{ musica.nome }}</h2>

  <p><strong>Artista:</strong> {{ musica.artista }}</p>
  <p><strong>Gênero:</strong> {{ musica.genero }}</p>
  <p><strong>Duração:</strong> {{ musica.duracao }}</p>
  <p><strong>Álbum:</strong> {{ musica.album }}</p>

  <button
    (click)="favoritar.emit(musica)">
    Favoritar
  </button>

  <button
  type="button"
  [routerLink]="['/catalogo', musica.firebaseId]">
  Ver Detalhes
  </button>

</div>
