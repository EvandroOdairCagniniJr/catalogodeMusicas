<div *ngIf="musica">

  <h1>{{ musica.nome }}</h1>

  <img
    [src]="musica.imagem"
    width="300"
  >

  <p>
    <strong>Artista:</strong>
    {{ musica.artista }}
  </p>

  <p>
    <strong>Gênero:</strong>
    {{ musica.genero }}
  </p>

  <p>
    <strong>Duração:</strong>
    {{ musica.duracao }}
  </p>

  <p>
    <strong>Álbum:</strong>
    {{ musica.album }}
  </p>

  <button (click)="excluir()">
    Excluir Música
  </button>

  <button
    [routerLink]="['/cadastro', id]"
  >
    Editar
  </button>

</div>
